  <text x="60" y="284" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#5A6B85">路由 · 鉴权 · 编排 · 解析 · 检索 · 计算 · 留痕</text>

  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#0F2A4A">
    <!-- Row 1 -->
    <rect x="60"  y="300" width="155" height="68" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="137" y="324" text-anchor="middle" font-weight="600">多智能体运行时</text>
    <text x="137" y="342" text-anchor="middle" font-size="10" fill="#5A6B85">LangGraph 编排</text>
    <text x="137" y="356" text-anchor="middle" font-size="10" fill="#5A6B85">Checkpoint · Supervisor</text>

    <rect x="230" y="300" width="155" height="68" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="307" y="324" text-anchor="middle" font-weight="600">文档解析器</text>
    <text x="307" y="342" text-anchor="middle" font-size="10" fill="#5A6B85">PDF · DOCX · Excel</text>
    <text x="307" y="356" text-anchor="middle" font-size="10" fill="#5A6B85">多编码 CSV 自动嗅探</text>

    <rect x="400" y="300" width="155" height="68" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="477" y="324" text-anchor="middle" font-weight="600">RAG 检索</text>
    <text x="477" y="342" text-anchor="middle" font-size="10" fill="#5A6B85">BM25 + 向量</text>
    <text x="477" y="356" text-anchor="middle" font-size="10" fill="#5A6B85">RRF 融合排序</text>

    <rect x="570" y="300" width="155" height="68" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="647" y="324" text-anchor="middle" font-weight="600">确定性计算</text>
    <text x="647" y="342" text-anchor="middle" font-size="10" fill="#5A6B85">DCF · WACC · Comps</text>
    <text x="647" y="356" text-anchor="middle" font-size="10" fill="#5A6B85">回测 · 蒙特卡洛</text>

    <rect x="740" y="300" width="160" height="68" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="820" y="324" text-anchor="middle" font-weight="600">LLM 客户端</text>
    <text x="820" y="342" text-anchor="middle" font-size="10" fill="#5A6B85">多供应商 · 意图路由</text>
    <text x="820" y="356" text-anchor="middle" font-size="10" fill="#5A6B85">DB 配置 + 环境变量</text>

    <!-- Row 2 -->
    <rect x="60"  y="380" width="245" height="60" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="182" y="404" text-anchor="middle" font-weight="600">安全合规</text>
    <text x="182" y="422" text-anchor="middle" font-size="10" fill="#5A6B85">ABAC · TOTP · PII · 注入防护 · 审计</text>

    <rect x="320" y="380" width="245" height="60" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="442" y="404" text-anchor="middle" font-weight="600">运行记录服务</text>
    <text x="442" y="422" text-anchor="middle" font-size="10" fill="#5A6B85">API 调用 · 问答交互 · 模块状态 · 实时监测</text>

    <rect x="580" y="380" width="320" height="60" rx="8" fill="#FFFFFF" stroke="#00875F" stroke-width="1.4"/>
    <text x="740" y="404" text-anchor="middle" font-weight="600">扩展体系</text>
    <text x="740" y="422" text-anchor="middle" font-size="10" fill="#5A6B85">工具 · 技能 · MCP · 代码沙箱 · 提示词 · 订阅</text>
  </g>

  <!-- 箭头 2 -->
  <line x1="480" y1="465" x2="480" y2="495" stroke="#5A6B85" stroke-width="2" marker-end="url(#arr)"/>
  <text x="490" y="482" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#5A6B85">ORM / 检索</text>

  <!-- ============ 数据层 ============ -->
  <rect x="40" y="500" width="880" height="100" rx="14" fill="url(#layerC)" stroke="#F0B26C" stroke-width="1.5"/>
  <text x="60" y="526" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#B25A00">数据层 · Storage</text>

  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#0F2A4A">
    <rect x="60"  y="540" width="220" height="48" rx="8" fill="#FFFFFF" stroke="#B25A00" stroke-width="1.4"/>
    <text x="170" y="562" text-anchor="middle" font-weight="600">SQLite (ORM)</text>
    <text x="170" y="580" text-anchor="middle" font-size="10" fill="#5A6B85">业务实体 · 运行记录 · 审计</text>

    <rect x="300" y="540" width="220" height="48" rx="8" fill="#FFFFFF" stroke="#B25A00" stroke-width="1.4"/>
    <text x="410" y="562" text-anchor="middle" font-weight="600">向量与倒排索引</text>
    <text x="410" y="580" text-anchor="middle" font-size="10" fill="#5A6B85">嵌入向量 · BM25 词项</text>

    <rect x="540" y="540" width="220" height="48" rx="8" fill="#FFFFFF" stroke="#B25A00" stroke-width="1.4"/>
    <text x="650" y="562" text-anchor="middle" font-weight="600">文件与配置</text>
    <text x="650" y="580" text-anchor="middle" font-size="10" fill="#5A6B85">上传文档 · 模板 · 提示词</text>

    <rect x="780" y="540" width="120" height="48" rx="8" fill="#FFFFFF" stroke="#B25A00" stroke-width="1.4"/>
    <text x="840" y="562" text-anchor="middle" font-weight="600">缓存</text>
    <text x="840" y="580" text-anchor="middle" font-size="10" fill="#5A6B85">LLM 配置 TTL</text>
  </g>
</svg>
