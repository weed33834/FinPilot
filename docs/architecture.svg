<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" width="960" height="620" role="img" aria-label="FinPilot AI 架构">
  <defs>
    <linearGradient id="layerA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8F0FF"/>
      <stop offset="100%" stop-color="#DCE9FF"/>
    </linearGradient>
    <linearGradient id="layerB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E6FBF5"/>
      <stop offset="100%" stop-color="#D2F3E6"/>
    </linearGradient>
    <linearGradient id="layerC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5A6B85"/>
    </marker>
  </defs>

  <rect width="960" height="620" fill="#FFFFFF"/>

  <text x="480" y="32" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="700" fill="#0F2A4A">FinPilot AI — 系统架构</text>

  <!-- ============ 接入层 ============ -->
  <rect x="40" y="60" width="880" height="140" rx="14" fill="url(#layerA)" stroke="#B8CDFA" stroke-width="1.5"/>
  <text x="60" y="86" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="700" fill="#1E5BFF">接入层 · Frontend</text>
  <text x="60" y="104" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#5A6B85">React 19 + Vite + TypeScript + Tailwind 4</text>

  <g font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#0F2A4A">
    <rect x="60"  y="120" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#1E5BFF" stroke-width="1.4"/>
    <text x="120" y="148" text-anchor="middle" font-weight="600">智能问答</text>
    <text x="120" y="166" text-anchor="middle" font-size="10" fill="#5A6B85">文件上传 · SSE 流式</text>

    <rect x="200" y="120" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#1E5BFF" stroke-width="1.4"/>
    <text x="260" y="148" text-anchor="middle" font-weight="600">报告中心</text>
    <text x="260" y="166" text-anchor="middle" font-size="10" fill="#5A6B85">模板 · 订阅 · 审批</text>

    <rect x="340" y="120" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#1E5BFF" stroke-width="1.4"/>
    <text x="400" y="148" text-anchor="middle" font-weight="600">文档解析</text>
    <text x="400" y="166" text-anchor="middle" font-size="10" fill="#5A6B85">PDF / DOCX / Excel</text>

    <rect x="480" y="120" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#1E5BFF" stroke-width="1.4"/>
    <text x="540" y="148" text-anchor="middle" font-weight="600">运行记录</text>
    <text x="540" y="166" text-anchor="middle" font-size="10" fill="#5A6B85">日志 · 问答 · 模块</text>

    <rect x="620" y="120" width="120" height="60" rx="8" fill="#FFFFFF" stroke="#1E5BFF" stroke-width="1.4"/>
    <text x="680" y="148" text-anchor="middle" font-weight="600">审计与安全</text>
    <text x="680" y="166" text-anchor="middle" font-size="10" fill="#5A6B85">ABAC · TOTP · PII</text>

    <rect x="760" y="120" width="140" height="60" rx="8" fill="#FFFFFF" stroke="#1E5BFF" stroke-width="1.4"/>
    <text x="830" y="148" text-anchor="middle" font-weight="600">管理后台</text>
    <text x="830" y="166" text-anchor="middle" font-size="10" fill="#5A6B85">用户 · 工具 · 沙箱 · MCP</text>
  </g>

  <!-- 箭头 1 -->
  <line x1="480" y1="205" x2="480" y2="235" stroke="#5A6B85" stroke-width="2" marker-end="url(#arr)"/>
  <text x="490" y="222" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" fill="#5A6B85">HTTP / SSE</text>

