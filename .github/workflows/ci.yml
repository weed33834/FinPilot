name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e . --no-deps

      - name: Import smoke test
        run: |
          python -c "import finpilot.api.router; import finpilot.agent.graph; import finpilot_equity.web_app.main; print('imports ok')"

      - name: ReAct parser unit test
        run: |
          python - <<'PY'
          from finpilot.agent.react_nodes import parse_react_output
          cases = [
              ('Thought: t\nAction: nl2sql\nAction Input: {"question":"x"}\n', 'nl2sql', True),
              ('<tool_call><function=nl2sql><parameter=question>x</parameter></function></tool_call>', 'nl2sql', True),
              ('<answer>最终答案</answer>', '', True),
          ]
          for text, exp_action, exp_ok in cases:
              r = parse_react_output(text)
              assert r.get('parse_ok') == exp_ok, f"parse_ok mismatch: {r}"
              if exp_action:
                  assert r.get('action') == exp_action, f"action mismatch: {r}"
          print('react parser: 3/3 passed')
          PY

  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build
